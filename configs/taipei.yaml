# =============================================================================
# Taipei (台北) - Hot Summer Cold Winter Zone (by climatic similarity)
# NOTE: Non-mainland city. Climate zone assigned by climatic similarity (hscw),
#       similar to Yangtze River Delta cities (Nanjing/Shanghai).
# NOTE: Electricity price in CNY-equivalent (converted from TWD at ~0.22 rate).
# =============================================================================

city:
  name_en: "Taipei"
  name_cn: "台北"
  climate_zone: "hscw"
  climate_zone_cn: "夏热冬冷（参照）"
  province: "台湾"
  latitude: 25.03
  longitude: 121.57
  is_primary: false
  paper_heritage: null

urban_profile:
  population_million: 2.6
  built_area_km2: 272
  city_tier: "major"
  dominant_housing: "mid_rise"
  development_stage: "mature"

osm:
  # Da'an District + Zhongzheng + Xinyi core
  # High/mid-rise residential concentration in Taipei Basin
  # Avoids Nangang/Neihu (tech parks) and Beitou (low-density hot spring area)
  place_query: null
  bbox: [25.06, 25.01, 121.57, 121.51]  # north, south, east, west
  relation_id: null
  residential_tags:
    building: ["residential", "apartments", "house", "detached", "semidetached_house", "terrace"]
    landuse: ["residential"]
  default_floor_height: 3.0

pvgis:
  api_base: "https://re.jrc.ec.europa.eu/api/v5_3"
  data_products: ["tmy", "series"]
  series_years: [2005, 2020]
  optimal_angle: null

pv_system:
  module_efficiency: 0.20
  module_power_wp: 550
  module_area_m2: 2.58
  temperature_coefficient: -0.0035
  inverter_efficiency: 0.96
  system_losses: 0.14
  tilt: null       # Will default to ~25° (latitude-based)
  azimuth: 180
  roof_utilization_ratio: 0.70

economics:
  electricity_price_cny_kwh: 0.62     # TWD ~2.8/kWh (mid-tier) converted at 0.22 CNY/TWD
  pv_cost_cny_wp: 3.5
  annual_degradation: 0.008
  system_lifetime_years: 25
  discount_rate: 0.06
  subsidy_cny_kwh: 0.0
  o_and_m_ratio: 0.01

monte_carlo:
  n_samples: 10000
  sampling_method: "lhs"
  random_seed: 42
  uncertain_params:
    ghi_uncertainty: 0.09   # 盆地地形+梅雨/台风，云量变率最高
    module_efficiency: { distribution: "triangular", params: [0.18, 0.20, 0.22] }
    system_losses: { distribution: "uniform", params: [0.10, 0.18] }
    pv_cost_cny_wp: { distribution: "triangular", params: [2.8, 3.5, 4.5] }
    electricity_price_factor: { distribution: "uniform", params: [0.85, 1.15] }
    annual_degradation: { distribution: "triangular", params: [0.006, 0.008, 0.01] }

sensitivity:
  method: "sobol"
  n_samples: 4096
  confidence_level: 0.95
  calc_second_order: true
