# =============================================================================
# Hohhot (呼和浩特) - Severe Cold Zone (严寒地区)
# =============================================================================

city:
  name_en: "Hohhot"
  name_cn: "呼和浩特"
  climate_zone: "severe_cold"
  climate_zone_cn: "严寒"
  province: "Inner Mongolia"
  latitude: 40.84
  longitude: 111.75
  is_primary: false
  paper_heritage: null

urban_profile:
  population_million: 3.4
  built_area_km2: 260
  city_tier: "large"
  dominant_housing: "mid_rise"
  development_stage: "new_dominant"

osm:
  # 原 place_query 返回 658 km²（density=0.002，FAR=0.02）
  # 小范围 bbox (<60 km²) 只得 287-525 栋，不足 1000
  # 改为覆盖赛罕+新城核心的宽幅 bbox：n=1085，67 km²
  place_query: null
  bbox: [40.84, 40.78, 111.74, 111.62]  # north, south, east, west (center_wide)
  relation_id: null
  residential_tags:
    building: ["residential", "apartments", "house", "detached", "semidetached_house", "terrace"]
    landuse: ["residential"]
  default_floor_height: 3.0

pvgis:
  api_base: "https://re.jrc.ec.europa.eu/api/v5_3"
  data_products: ["tmy", "series"]
  series_years: [2005, 2020]
  optimal_angle: null

pv_system:
  module_efficiency: 0.20
  module_power_wp: 550
  module_area_m2: 2.58
  temperature_coefficient: -0.0035
  inverter_efficiency: 0.96
  system_losses: 0.14
  tilt: null       # Will default to ~41° (latitude-based)
  azimuth: 180
  roof_utilization_ratio: 0.70

economics:
  electricity_price_cny_kwh: 0.496    # Inner Mongolia residential tier-1
  pv_cost_cny_wp: 3.0
  annual_degradation: 0.005
  system_lifetime_years: 25
  discount_rate: 0.06
  subsidy_cny_kwh: 0.0
  o_and_m_ratio: 0.01

monte_carlo:
  n_samples: 10000
  sampling_method: "lhs"
  random_seed: 42
  uncertain_params:
    ghi_uncertainty: 0.04   # 半干旱草原
    module_efficiency: { distribution: "triangular", params: [0.18, 0.20, 0.22] }
    system_losses: { distribution: "uniform", params: [0.10, 0.18] }
    pv_cost_cny_wp: { distribution: "triangular", params: [2.5, 3.0, 4.0] }
    electricity_price_factor: { distribution: "uniform", params: [0.9, 1.1] }
    annual_degradation: { distribution: "triangular", params: [0.003, 0.005, 0.007] }

sensitivity:
  method: "sobol"
  n_samples: 4096
  confidence_level: 0.95
  calc_second_order: true
