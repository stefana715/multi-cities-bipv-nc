# =============================================================================
# Urumqi (乌鲁木齐) - Severe Cold Zone (严寒地区)
# GB 50176-2016: Zone I (严寒A区). HDD18 ≈ 4800, Jan mean ≈ -15°C.
# Represents the arid inland severe-cold type, distinct from northeast cities
# (Harbin/Changchun/Shenyang) which are humid continental.
# High solar resource (GHI ~1600 kWh/m²/yr) despite extreme cold — key for BIPV.
# =============================================================================

city:
  name_en: "Urumqi"
  name_cn: "乌鲁木齐"
  climate_zone: "severe_cold"
  climate_zone_cn: "严寒"
  province: "Xinjiang"
  latitude: 43.83
  longitude: 87.61
  is_primary: false
  paper_heritage: null

urban_profile:
  population_million: 4.0
  built_area_km2: 430
  city_tier: "large"
  dominant_housing: "mid_rise"
  development_stage: "mixed_age"

osm:
  # 原 place_query 返回 143 km² 郊区数据（均高 3.97m，FAR 0.02），已改为住宅区 bbox
  # combined_core (天山+沙依巴克) 仍以1层商业建筑为主（均高 3.57m）
  # 新市区核心住宅带：Soviet-era 板楼为主，均高 15.8m，FAR 0.379 ✓
  place_query: null
  bbox: [43.92, 43.85, 87.62, 87.54]   # north, south, east, west (新市区 Xinshi)
  relation_id: null
  residential_tags:
    building: ["residential", "apartments", "house", "detached", "semidetached_house", "terrace"]
    landuse: ["residential"]
  default_floor_height: 3.0

pvgis:
  api_base: "https://re.jrc.ec.europa.eu/api/v5_3"
  data_products: ["tmy", "series"]
  series_years: [2005, 2020]
  optimal_angle: null

pv_system:
  module_efficiency: 0.20
  module_power_wp: 550
  module_area_m2: 2.58
  temperature_coefficient: -0.0035
  inverter_efficiency: 0.96
  system_losses: 0.14
  tilt: null       # Will default to ~44° (latitude-based)
  azimuth: 180
  roof_utilization_ratio: 0.70

economics:
  electricity_price_cny_kwh: 0.400    # Xinjiang residential tier-1 (coal-subsidized)
  pv_cost_cny_wp: 3.0
  annual_degradation: 0.005
  system_lifetime_years: 25
  discount_rate: 0.06
  subsidy_cny_kwh: 0.0
  o_and_m_ratio: 0.01

monte_carlo:
  n_samples: 10000
  sampling_method: "lhs"
  random_seed: 42
  uncertain_params:
    ghi_uncertainty: 0.03   # 极干旱大陆性, 晴天占比高
    module_efficiency: { distribution: "triangular", params: [0.18, 0.20, 0.22] }
    system_losses: { distribution: "uniform", params: [0.10, 0.18] }
    pv_cost_cny_wp: { distribution: "triangular", params: [2.5, 3.0, 4.0] }
    electricity_price_factor: { distribution: "uniform", params: [0.95, 1.05] }
    annual_degradation: { distribution: "triangular", params: [0.003, 0.005, 0.007] }

sensitivity:
  method: "sobol"
  n_samples: 4096
  confidence_level: 0.95
  calc_second_order: true
