# =============================================================================
# Hong Kong (香港) - Hot Summer Warm Winter Zone (by climatic similarity)
# NOTE: Non-mainland city. Climate zone assigned by climatic similarity (hsww),
#       not GB50176 formal classification.
# NOTE: Electricity price in CNY-equivalent (converted from HKD at ~0.91 rate).
# NOTE: PV installation cost higher than mainland due to labor and logistics.
# =============================================================================

city:
  name_en: "Hong Kong"
  name_cn: "香港"
  climate_zone: "hsww"
  climate_zone_cn: "夏热冬暖（参照）"
  province: "香港特别行政区"
  latitude: 22.32
  longitude: 114.17
  is_primary: false
  paper_heritage: null

urban_profile:
  population_million: 7.4
  built_area_km2: 80
  city_tier: "mega"
  dominant_housing: "high_rise"
  development_stage: "mature"

osm:
  # Kowloon core: Yau Tsim Mong + Sham Shui Po + Kowloon City
  # Global benchmark for ultra-high-density residential high-rise
  # Avoids New Territories (suburban/low-density) and HK Island CBD (offices)
  place_query: null
  bbox: [22.34, 22.30, 114.19, 114.14]  # north, south, east, west
  relation_id: null
  residential_tags:
    building: ["residential", "apartments", "house", "detached", "semidetached_house", "terrace", "yes"]
    landuse: ["residential"]
  default_floor_height: 3.0

pvgis:
  api_base: "https://re.jrc.ec.europa.eu/api/v5_3"
  data_products: ["tmy", "series"]
  series_years: [2005, 2020]
  optimal_angle: null

pv_system:
  module_efficiency: 0.20
  module_power_wp: 550
  module_area_m2: 2.58
  temperature_coefficient: -0.0035
  inverter_efficiency: 0.96
  system_losses: 0.14
  tilt: null       # Will default to ~22° (latitude-based)
  azimuth: 180
  roof_utilization_ratio: 0.70

economics:
  electricity_price_cny_kwh: 1.20     # HKD ~1.32/kWh converted at 0.91 CNY/HKD
  pv_cost_cny_wp: 4.5
  annual_degradation: 0.008
  system_lifetime_years: 25
  discount_rate: 0.06
  subsidy_cny_kwh: 0.0
  o_and_m_ratio: 0.01

monte_carlo:
  n_samples: 10000
  sampling_method: "lhs"
  random_seed: 42
  uncertain_params:
    ghi_uncertainty: 0.07   # 台风/季风影响显著
    module_efficiency: { distribution: "triangular", params: [0.18, 0.20, 0.22] }
    system_losses: { distribution: "uniform", params: [0.10, 0.18] }
    pv_cost_cny_wp: { distribution: "triangular", params: [3.8, 4.5, 5.5] }
    electricity_price_factor: { distribution: "uniform", params: [0.85, 1.15] }
    annual_degradation: { distribution: "triangular", params: [0.006, 0.008, 0.01] }

sensitivity:
  method: "sobol"
  n_samples: 4096
  confidence_level: 0.95
  calc_second_order: true
