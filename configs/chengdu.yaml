# =============================================================================
# Chengdu (成都) - Hot Summer Cold Winter Zone (夏热冬冷地区)
# Climate zone: HSCW per GB 50176-2016 (official standard, no deviation).
#
# Why HSCW (not Mild):
#   GB 50176-2016 defines Mild (温和) as HDD18 < 2000 AND CDD26 < 100.
#   Chengdu HDD18 ≈ 1700, CDD26 ≈ 70 — borderline, but the standard
#   explicitly assigns Chengdu to HSCW (夏热冬冷) based on its humid basin
#   climate, mandatory winter heating load, and summer cooling demand.
#   Using "Mild" would misrepresent energy needs and invite reviewer rejection.
#   All prior BIPV studies citing Chengdu use the HSCW classification.
#
# Within HSCW, Chengdu is the low-GHI, high-density representative
# (contrast: Wuhan=central HSCW, Nanjing=eastern HSCW, Chengdu=western HSCW).
# =============================================================================

city:
  name_en: "Chengdu"
  name_cn: "成都"
  climate_zone: "hscw"
  climate_zone_cn: "夏热冬冷"
  province: "Sichuan"
  latitude: 30.67
  longitude: 104.07
  is_primary: false
  paper_heritage: null

urban_profile:
  population_million: 21.1
  built_area_km2: 1298
  city_tier: "mega"
  dominant_housing: "high_rise"
  development_stage: "new_dominant"

osm:
  place_query: "锦江区, 成都市, 中国"
  bbox: null
  relation_id: null
  residential_tags:
    building: ["residential", "apartments", "house", "detached", "semidetached_house", "terrace"]
    landuse: ["residential"]
  default_floor_height: 3.0

pvgis:
  api_base: "https://re.jrc.ec.europa.eu/api/v5_3"
  data_products: ["tmy", "series"]
  series_years: [2005, 2020]
  optimal_angle: null

pv_system:
  module_efficiency: 0.20
  module_power_wp: 550
  module_area_m2: 2.58
  temperature_coefficient: -0.0035
  inverter_efficiency: 0.96
  system_losses: 0.14
  tilt: null       # Will default to ~31° (latitude-based)
  azimuth: 180
  roof_utilization_ratio: 0.70

economics:
  electricity_price_cny_kwh: 0.502    # Sichuan residential tier-1
  pv_cost_cny_wp: 3.0
  annual_degradation: 0.006
  system_lifetime_years: 25
  discount_rate: 0.06
  subsidy_cny_kwh: 0.0
  o_and_m_ratio: 0.01

monte_carlo:
  n_samples: 10000
  sampling_method: "lhs"
  random_seed: 42
  uncertain_params:
    ghi_uncertainty: 0.10   # 四川盆地, 全国最少日照
    module_efficiency: { distribution: "triangular", params: [0.18, 0.20, 0.22] }
    system_losses: { distribution: "uniform", params: [0.10, 0.18] }
    pv_cost_cny_wp: { distribution: "triangular", params: [2.5, 3.0, 4.0] }
    electricity_price_factor: { distribution: "uniform", params: [0.9, 1.1] }
    annual_degradation: { distribution: "triangular", params: [0.005, 0.006, 0.008] }

sensitivity:
  method: "sobol"
  n_samples: 4096
  confidence_level: 0.95
  calc_second_order: true
