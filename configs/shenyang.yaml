# =============================================================================
# Shenyang (沈阳) - Severe Cold Zone (严寒地区)
# =============================================================================
# FIX LOG (NC Phase 1a):
#   - 旧 bbox [41.85, 41.75, 123.50, 123.38] 覆盖了沈河区郊区，
#     仅获取687栋建筑，98%为低层(3m)，与沈阳实际住宅形态严重不符。
#   - 新方案：改用和平区核心住宅区 bbox，该区域是沈阳最典型的
#     多层/中高层住宅集中区（6-30层板式住宅为主）。
#   - 备选方案：皇姑区 bbox [41.835, 41.785, 123.445, 123.385]
# =============================================================================

city:
  name_en: "Shenyang"
  name_cn: "沈阳"
  climate_zone: "severe_cold"
  climate_zone_cn: "严寒"
  province: "Liaoning"
  latitude: 41.80
  longitude: 123.43
  is_primary: false
  paper_heritage: null

urban_profile:
  population_million: 9.1
  built_area_km2: 465
  city_tier: "super_large"
  dominant_housing: "mixed"
  development_stage: "mixed_age"

osm:
  # 和平区核心住宅区 bbox（北至南湖公园，南至浑河，东至青年大街，西至南京街）
  # 该区域以6-30层住宅为主，是沈阳最具代表性的居住区之一
  place_query: null
  bbox: [41.815, 41.775, 123.435, 123.385]   # north, south, east, west
  relation_id: null
  residential_tags:
    building: ["residential", "apartments", "house", "detached", "semidetached_house", "terrace"]
    landuse: ["residential"]
  default_floor_height: 3.0

pvgis:
  api_base: "https://re.jrc.ec.europa.eu/api/v5_3"
  data_products: ["tmy", "series"]
  series_years: [2005, 2020]
  optimal_angle: null

pv_system:
  module_efficiency: 0.20
  module_power_wp: 550
  module_area_m2: 2.58
  temperature_coefficient: -0.0035
  inverter_efficiency: 0.96
  system_losses: 0.14
  tilt: null       # Will default to ~42° (latitude-based)
  azimuth: 180
  roof_utilization_ratio: 0.70

economics:
  electricity_price_cny_kwh: 0.53     # Liaoning residential tier-1
  pv_cost_cny_wp: 3.0
  annual_degradation: 0.005
  system_lifetime_years: 25
  discount_rate: 0.06
  subsidy_cny_kwh: 0.0
  o_and_m_ratio: 0.01

monte_carlo:
  n_samples: 10000
  sampling_method: "lhs"
  random_seed: 42
  uncertain_params:
    ghi_uncertainty: 0.05
    module_efficiency: { distribution: "triangular", params: [0.18, 0.20, 0.22] }
    system_losses: { distribution: "uniform", params: [0.10, 0.18] }
    pv_cost_cny_wp: { distribution: "triangular", params: [2.5, 3.0, 4.0] }
    electricity_price_factor: { distribution: "uniform", params: [0.9, 1.1] }

sensitivity:
  method: "sobol"
  n_samples: 4096
  confidence_level: 0.95
  calc_second_order: true
