# =============================================================================
# Xi'an (西安) - Cold Zone (寒冷地区)
# =============================================================================

city:
  name_en: "Xian"
  name_cn: "西安"
  climate_zone: "cold"
  climate_zone_cn: "寒冷"
  province: "Shaanxi"
  latitude: 34.26
  longitude: 108.94
  is_primary: false
  paper_heritage: null

urban_profile:
  population_million: 13.0
  built_area_km2: 1070
  city_tier: "mega"
  dominant_housing: "high_rise"
  development_stage: "new_dominant"

osm:
  # 原 place_query（碑林区古城核心）FAR=1.09 —— 古城高密度异常值
  # 改为未央区住宅区（新城北部）：n=8091，65 km²，更代表西安住宅整体
  place_query: null
  bbox: [34.38, 34.30, 108.96, 108.88]  # north, south, east, west (weiyang_residential)
  relation_id: null
  residential_tags:
    building: ["residential", "apartments", "house", "detached", "semidetached_house", "terrace"]
    landuse: ["residential"]
  default_floor_height: 3.0

pvgis:
  api_base: "https://re.jrc.ec.europa.eu/api/v5_3"
  data_products: ["tmy", "series"]
  series_years: [2005, 2020]
  optimal_angle: null

pv_system:
  module_efficiency: 0.20
  module_power_wp: 550
  module_area_m2: 2.58
  temperature_coefficient: -0.0035
  inverter_efficiency: 0.96
  system_losses: 0.14
  tilt: null       # Will default to ~34° (latitude-based)
  azimuth: 180
  roof_utilization_ratio: 0.70

economics:
  electricity_price_cny_kwh: 0.498    # Shaanxi residential tier-1
  pv_cost_cny_wp: 3.0
  annual_degradation: 0.006
  system_lifetime_years: 25
  discount_rate: 0.06
  subsidy_cny_kwh: 0.0
  o_and_m_ratio: 0.01

monte_carlo:
  n_samples: 10000
  sampling_method: "lhs"
  random_seed: 42
  uncertain_params:
    ghi_uncertainty: 0.05
    module_efficiency: { distribution: "triangular", params: [0.18, 0.20, 0.22] }
    system_losses: { distribution: "uniform", params: [0.10, 0.18] }
    pv_cost_cny_wp: { distribution: "triangular", params: [2.5, 3.0, 4.0] }
    electricity_price_factor: { distribution: "uniform", params: [0.92, 1.08] }
    annual_degradation: { distribution: "triangular", params: [0.004, 0.006, 0.008] }

sensitivity:
  method: "sobol"
  n_samples: 4096
  confidence_level: 0.95
  calc_second_order: true
