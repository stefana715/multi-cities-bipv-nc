# =============================================================================
# Lhasa (拉萨) - Mild Zone (温和地区)
# NOTE: OSM building count ~2400 (better than expected for Tibet).
# Height coverage ~0.1% — area-based inference required (fix_*.py pattern).
# Lhasa is retained as an extreme case: highest GHI in dataset
# but constrained by altitude, economy, and BIPV market immaturity.
# Paper Section 2.3: data quality and representativeness acknowledged.
# =============================================================================

city:
  name_en: "Lhasa"
  name_cn: "拉萨"
  climate_zone: "mild"
  climate_zone_cn: "温和"
  province: "Tibet"
  latitude: 29.65
  longitude: 91.11
  is_primary: false
  paper_heritage: null

urban_profile:
  population_million: 0.9
  built_area_km2: 80
  city_tier: "medium"
  dominant_housing: "low_rise"
  development_stage: "mixed_age"

osm:
  place_query: null
  bbox: [29.68, 29.63, 91.15, 91.08]
  relation_id: null
  residential_tags:
    building: ["residential", "apartments", "house", "detached", "semidetached_house", "terrace"]
    landuse: ["residential"]
  default_floor_height: 3.0

pvgis:
  api_base: "https://re.jrc.ec.europa.eu/api/v5_3"
  data_products: ["tmy", "series"]
  series_years: [2005, 2020]
  optimal_angle: null

pv_system:
  module_efficiency: 0.20
  module_power_wp: 550
  module_area_m2: 2.58
  temperature_coefficient: -0.0035
  inverter_efficiency: 0.96
  system_losses: 0.14
  tilt: null       # Will default to ~30° (latitude-based)
  azimuth: 180
  roof_utilization_ratio: 0.70

economics:
  electricity_price_cny_kwh: 0.368    # Tibet residential (policy-subsidized)
  pv_cost_cny_wp: 3.0
  annual_degradation: 0.005
  system_lifetime_years: 25
  discount_rate: 0.06
  subsidy_cny_kwh: 0.0
  o_and_m_ratio: 0.01

monte_carlo:
  n_samples: 10000
  sampling_method: "lhs"
  random_seed: 42
  uncertain_params:
    ghi_uncertainty: 0.03   # 高原极高辐照, 晴天占比高
    module_efficiency: { distribution: "triangular", params: [0.18, 0.20, 0.22] }
    system_losses: { distribution: "uniform", params: [0.10, 0.18] }
    pv_cost_cny_wp: { distribution: "triangular", params: [2.5, 3.0, 4.0] }
    electricity_price_factor: { distribution: "uniform", params: [0.95, 1.05] }
    annual_degradation: { distribution: "triangular", params: [0.003, 0.005, 0.008] }

sensitivity:
  method: "sobol"
  n_samples: 4096
  confidence_level: 0.95
  calc_second_order: true
