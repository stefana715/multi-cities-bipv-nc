# =============================================================================
# Harbin (哈尔滨) - Severe Cold Zone (严寒地区)
# =============================================================================

city:
  name_en: "Harbin"
  name_cn: "哈尔滨"
  climate_zone: "severe_cold"
  climate_zone_cn: "严寒"
  province: "Heilongjiang"
  latitude: 45.75
  longitude: 126.65
  is_primary: true
  paper_heritage: null

urban_profile:
  population_million: 10.0
  built_area_km2: 458
  city_tier: "super_large"
  dominant_housing: "mixed"
  development_stage: "mixed_age"

osm:
  # Use a representative residential district for audit
  # Nangang District (南岗区) - central urban area with diverse housing
  place_query: "南岗区, 哈尔滨市, 中国"
  bbox: null
  relation_id: null
  residential_tags:
    building: ["residential", "apartments", "house", "detached", "semidetached_house", "terrace"]
    landuse: ["residential"]
  default_floor_height: 3.0

pvgis:
  api_base: "https://re.jrc.ec.europa.eu/api/v5_3"
  data_products: ["tmy", "series"]
  series_years: [2005, 2020]
  optimal_angle: null

pv_system:
  module_efficiency: 0.20
  module_power_wp: 550
  module_area_m2: 2.58
  temperature_coefficient: -0.0035
  inverter_efficiency: 0.96
  system_losses: 0.14
  tilt: null       # Will default to ~45° (latitude-based)
  azimuth: 180
  roof_utilization_ratio: 0.70

economics:
  electricity_price_cny_kwh: 0.51    # Heilongjiang residential tier-1
  pv_cost_cny_wp: 3.0
  annual_degradation: 0.004
  system_lifetime_years: 25
  discount_rate: 0.06
  subsidy_cny_kwh: 0.0
  o_and_m_ratio: 0.01

monte_carlo:
  n_samples: 10000
  sampling_method: "lhs"
  random_seed: 42
  uncertain_params:
    ghi_uncertainty: 0.06   # 冬季长云多
    module_efficiency: { distribution: "triangular", params: [0.18, 0.20, 0.22] }
    system_losses: { distribution: "uniform", params: [0.10, 0.18] }
    pv_cost_cny_wp: { distribution: "triangular", params: [2.5, 3.0, 4.0] }
    electricity_price_factor: { distribution: "uniform", params: [0.9, 1.1] }
    annual_degradation: { distribution: "triangular", params: [0.003, 0.004, 0.006] }

sensitivity:
  method: "sobol"
  n_samples: 4096
  confidence_level: 0.95
  calc_second_order: true
